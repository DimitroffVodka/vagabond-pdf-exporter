<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Vagabond PDF Exporter</title>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/pdf-lib/1.17.1/pdf-lib.min.js"></script>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      background: #1a1a2e;
      color: #e0e0e0;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      min-height: 100vh;
      padding: 24px;
      gap: 16px;
    }
    h1 {
      font-size: 16px;
      font-weight: 600;
      color: #c8b420;
      text-align: center;
    }
    p {
      font-size: 13px;
      color: #aaa;
      text-align: center;
      line-height: 1.5;
    }
    button {
      background: #c8b420;
      color: #1a1a2e;
      border: none;
      border-radius: 6px;
      padding: 10px 24px;
      font-size: 14px;
      font-weight: 700;
      cursor: pointer;
      width: 100%;
      transition: background 0.2s;
    }
    button:hover { background: #e0cb30; }
    button:disabled { background: #555; color: #888; cursor: not-allowed; }
    #status {
      font-size: 12px;
      color: #aaa;
      text-align: center;
      min-height: 18px;
    }
    #status.error { color: #f87171; }
    #status.success { color: #86efac; }
    .char-preview {
      background: #16213e;
      border-radius: 8px;
      padding: 12px;
      width: 100%;
      font-size: 12px;
      display: none;
    }
    .char-preview .name {
      font-size: 15px;
      font-weight: 700;
      color: #c8b420;
      margin-bottom: 4px;
    }
    .char-preview .sub {
      color: #aaa;
      margin-bottom: 8px;
    }
    .char-preview .stats {
      display: grid;
      grid-template-columns: repeat(3, 1fr);
      gap: 4px;
    }
    .char-preview .stat {
      background: #0f3460;
      border-radius: 4px;
      padding: 4px;
      text-align: center;
    }
    .char-preview .stat .label { font-size: 10px; color: #888; }
    .char-preview .stat .val { font-size: 14px; font-weight: 700; }
  </style>
</head>

  </div>

    let characterData = null;

    function setStatus(msg, type = '') {
      const el = document.getElementById('status');
      el.textContent = msg;
      el.className = type;
    }

    function findVagabondFrame() {
      // Walk all iframes in the top window looking for the vagabond extension
      try {
        const frames = window.top.document.querySelectorAll('iframe');
        for (const frame of frames) {
          try {
            const src = frame.src || '';
            if (src.includes('vagabond-extension')) return frame;
          } catch(e) {}
        }
        // Also try contentWindow approach
        for (const frame of frames) {
          try {
            const doc = frame.contentDocument;
            if (doc && doc.querySelector('[class*="_Sheet_"]')) return frame;
          } catch(e) {}
        }
      } catch(e) {}
      return null;
    }

    function scrapeFromDoc(doc) {
      const data = {};

      // Helper: find input near a label text
      function findInput(labelText) {
        const labels = doc.querySelectorAll('[class*="fieldLabel"]');
        for (const label of labels) {
          if (label.textContent.trim() === labelText) {
            const container = label.closest('[class*="container"]') || label.closest('[class*="fieldContainer"]');
            if (container) {
              const input = container.querySelector('input, select');
              if (input) return input.value;
            }
          }
        }
        return '';
      }

      // Basic info
      data.name     = findInput('Name');
      data.level    = findInput('Level');
      data.xp       = findInput('XP');
      data.ancestry = findInput('Ancestry');
      data.cls      = findInput('Class');
      data.size     = findInput('Size');
      data.beingType = findInput('Being Type');
      data.speed    = findInput('Speed');
      data.speedBonus = findInput('Sp. Bonus');

      // Stats
      data.mit = findInput('Might');
      data.dex = findInput('Dexterity');
      data.awr = findInput('Awareness');
      data.rsn = findInput('Reason');
      data.prs = findInput('Presence');
      data.luk = findInput('Luck');

      // Resources - HP has two inputs (current/max) in same container
      function findDualInput(labelText) {
        const labels = doc.querySelectorAll('[class*="fieldLabel"]');
        for (const label of labels) {
          if (label.textContent.trim() === labelText) {
            const container = label.closest('[class*="container"]') || label.closest('[class*="fieldContainer"]');
            if (container) {
              const inputs = container.querySelectorAll('input');
              if (inputs.length >= 2) return [inputs[0].value, inputs[1].value];
              if (inputs.length === 1) return [inputs[0].value, ''];
            }
          }
        }
        return ['', ''];
      }

      const hp     = findDualInput('HP');
      const mana   = findDualInput('Mana');
      const luck   = findDualInput('Luck');
      const fatigue = findDualInput('Fatigue');

      data.currentHP  = hp[0];
      data.maxHP      = hp[1];
      data.currentMana = mana[0];
      data.maxMana    = mana[1];
      data.currentLuck = luck[0];
      data.fatigue    = fatigue[0];
      data.armor      = findInput('Armor');
      data.castMax    = findInput('Cast Max');

      // Saves
      data.reflexSave  = findInput('Reflex') || '';
      data.endureSave  = findInput('Endure') || '';
      data.willSave    = findInput('Will') || '';

      // Saves - grab right label values from save rows
      function findSaveValue(saveLabel) {
        const labels = doc.querySelectorAll('[class*="_label_"]');
        for (const label of labels) {
          if (label.textContent.trim().startsWith(saveLabel)) {
            const container = label.closest('[class*="_innerContainer_"]');
            if (container) {
              const right = container.querySelector('[class*="_rightLabel_"]');
              if (right) return right.textContent.trim();
            }
          }
        }
        return '';
      }
      data.reflexSave = findSaveValue('Reflex');
      data.endureSave = findSaveValue('Endure');
      data.willSave   = findSaveValue('Will');

      // Skills - trained checkboxes + difficulty values
      const skillNames = ['Arcana','Brawl','Craft','Detect','Finesse','Influence',
                          'Leadership','Medicine','Mysticism','Performance','Sneak','Survival'];
      data.skills = {};
      for (const skill of skillNames) {
        // Find by label text starting with skill name
        const labels = doc.querySelectorAll('[class*="_label_"]');
        for (const label of labels) {
          if (label.textContent.trim().startsWith(skill + ' [')) {
            const container = label.closest('[class*="_innerContainer_"]');
            if (container) {
              const cb = container.querySelector('input[type="checkbox"]');
              const right = container.querySelector('[class*="_rightLabel_"]');
              data.skills[skill] = {
                trained: cb ? cb.checked : false,
                difficulty: right ? right.textContent.trim() : ''
              };
            }
            break;
          }
        }
      }

      // Attack checks
      function findAttackValue(attackLabel) {
        const labels = doc.querySelectorAll('[class*="_label_"]');
        for (const label of labels) {
          if (label.textContent.trim().startsWith(attackLabel + ' [')) {
            const container = label.closest('[class*="_innerContainer_"]');
            if (container) {
              const cb = container.querySelector('input[type="checkbox"]');
              const right = container.querySelector('[class*="_rightLabel_"]');
              return {
                trained: cb ? cb.checked : false,
                difficulty: right ? right.textContent.trim() : ''
              };
            }
          }
        }
        return { trained: false, difficulty: '' };
      }
      data.melee  = findAttackValue('Melee');
      data.ranged = findAttackValue('Ranged');

      return data;
    }

    function scanCharacter() {
      setStatus('Scanning...', '');
      document.getElementById('scanBtn').disabled = true;

      try {
        // Try to access parent frames
        let doc = null;

        // Method 1: look for vagabond iframe in top document
        try {
          const frames = window.top.document.querySelectorAll('iframe');
          for (const frame of frames) {
            try {
              const src = frame.src || '';
              if (src.includes('vagabond-extension')) {
                doc = frame.contentDocument;
                break;
              }
            } catch(e) {}
          }
        } catch(e) {}

        // Method 2: search all iframes for the sheet class
        if (!doc) {
          try {
            const frames = window.top.document.querySelectorAll('iframe');
            for (const frame of frames) {
              try {
                const d = frame.contentDocument;
                if (d && d.querySelector('[class*="_Sheet_"]')) {
                  doc = d;
                  break;
                }
              } catch(e) {}
            }
          } catch(e) {}
        }

        if (!doc) {
          setStatus('Could not find Vagabond character sheet. Make sure the Vagabond extension is open.', 'error');
          document.getElementById('scanBtn').disabled = false;
          return;
        }

        characterData = scrapeFromDoc(doc);

        if (!characterData.name && !characterData.mit) {
          setStatus('Found the sheet but could not read data. Try opening the character sheet tab first.', 'error');
          document.getElementById('scanBtn').disabled = false;
          return;
        }

        // Show preview
        const preview = document.getElementById('preview');
        document.getElementById('prev-name').textContent = characterData.name || 'Unnamed';
        document.getElementById('prev-sub').textContent =
          [characterData.cls, characterData.ancestry, 'Level ' + (characterData.level || '?')].filter(Boolean).join(' · ');
        const statsEl = document.getElementById('prev-stats');
        statsEl.innerHTML = '';
        const statPairs = [
          ['MIT', characterData.mit], ['DEX', characterData.dex], ['AWR', characterData.awr],
          ['RSN', characterData.rsn], ['PRS', characterData.prs], ['LUK', characterData.luk]
        ];
        for (const [label, val] of statPairs) {
          statsEl.innerHTML += `<div class="stat"><div class="label">${label}</div><div class="val">${val || '-'}</div></div>`;
        }
        preview.style.display = 'block';

        setStatus('Character found! Ready to export.', 'success');
        document.getElementById('exportBtn').disabled = false;

      } catch(e) {
        setStatus('Error: ' + e.message, 'error');
      }

      document.getElementById('scanBtn').disabled = false;
    }

    async function exportPDF() {
      if (!characterData) return;
      setStatus('Generating PDF...', '');
      document.getElementById('exportBtn').disabled = true;

      try {
        const { PDFDocument } = PDFLib;

        // Decode embedded PDF
        const pdfBytes = Uint8Array.from(atob(PDF_B64), c => c.charCodeAt(0));
        const pdfDoc = await PDFDocument.load(pdfBytes);
        const form = pdfDoc.getForm();

        function setField(fieldName, value) {
          try {
            const field = form.getTextField(fieldName);
            field.setText(value != null ? String(value) : '');
          } catch(e) {}
        }

        function setCheckbox(fieldName, checked) {
          try {
            const field = form.getCheckBox(fieldName);
            if (checked) field.check();
            else field.uncheck();
          } catch(e) {}
        }

        // Basic info
        setField('Name', characterData.name);
        setField('Level', characterData.level);
        setField('XP', characterData.xp);
        setField('Ancestry', characterData.ancestry);
        setField('Class', characterData.cls);
        setField('Speed', characterData.speed);
        setField('Speed Bonus', characterData.speedBonus);

        // Stats (RSN in OBR = LOG in PDF)
        setField('MIT', characterData.mit);
        setField('DEX', characterData.dex);
        setField('AWR', characterData.awr);
        setField('LOG', characterData.rsn);
        setField('PRS', characterData.prs);
        setField('LUK', characterData.luk);

        // Resources
        setField('Current HP', characterData.currentHP);
        setField('Max HP', characterData.maxHP);
        setField('Armor Rating', characterData.armor);
        setField('Current Mana', characterData.currentMana);
        setField('Max Mana', characterData.maxMana);
        setField('Casting Maximum', characterData.castMax);
        setField('Current Luck', characterData.currentLuck);
        setField('Fatigue', characterData.fatigue);

        // Saves
        setField('Reflex Save Difficulty', characterData.reflexSave);
        setField('Endure Save Difficulty', characterData.endureSave);
        setField('Will Save Difficulty', characterData.willSave);

        // Skills
        const skillFieldMap = {
          'Arcana':      ['Arcana Trained',      'Arcana Skill Difficulty'],
          'Brawl':       ['Brawn Trained',        'Brawn Skill Difficulty'],
          'Craft':       ['Craft Trained',        'Craft Skill Difficulty'],
          'Detect':      ['Detect Trained',       'Detect Skill Difficulty'],
          'Finesse':     ['Finesse Trained',      'Finesse Skill Difficulty'],
          'Influence':   ['Influence Trained',    'Influence Skill Difficulty'],
          'Leadership':  ['Leadership Trained',   'Leadership Skill Difficulty'],
          'Medicine':    ['Medicine Trained',     'Medicine Skill Difficulty'],
          'Mysticism':   ['Mysticism Trained',    'Mysticism Skill Difficulty'],
          'Performance': ['Performance Trained',  'Performance Skill Difficulty'],
          'Sneak':       ['Sneak Trained',        'Sneak Skill Difficulty'],
          'Survival':    ['Survival Trained',     'Survival Skill Difficulty'],
        };

        for (const [skill, [trainedField, diffField]] of Object.entries(skillFieldMap)) {
          const s = characterData.skills[skill];
          if (s) {
            setCheckbox(trainedField, s.trained);
            setField(diffField, s.difficulty);
          }
        }

        // Attack checks
        setCheckbox('Melee Weapons Trained', characterData.melee?.trained);
        setField('Melee Attack Check Difficulty', characterData.melee?.difficulty);
        setCheckbox('Ranged Weapons Trained', characterData.ranged?.trained);
        setField('Ranged Attack Difficulty', characterData.ranged?.difficulty);

        // Size and Being Type (choice fields)
        try { form.getDropdown('Size').select(characterData.size || 'M'); } catch(e) {}
        try { form.getDropdown('Being Type').select(characterData.beingType || 'Humanlike'); } catch(e) {}

        // Flatten and download
        form.flatten();
        const filledBytes = await pdfDoc.save();
        const blob = new Blob([filledBytes], { type: 'application/pdf' });
        const url = URL.createObjectURL(blob);
        const a = document.createElement('a');
        a.href = url;
        a.download = (characterData.name || 'character') + '-hero-record.pdf';
        a.click();
        URL.revokeObjectURL(url);

        setStatus('PDF downloaded!', 'success');

      } catch(e) {
        setStatus('Export failed: ' + e.message, 'error');
        console.error(e);
      }

      document.getElementById('exportBtn').disabled = false;
    }
  </script>

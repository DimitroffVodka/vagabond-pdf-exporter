<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Vagabond PDF Exporter</title>
  <script src="vendor/pdf-lib.min.js"></script>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      background: #1a1a2e;
      color: #e0e0e0;
      display: flex;
      flex-direction: column;
      align-items: center;
      padding: 20px;
      gap: 12px;
    }
    h1 { font-size: 16px; font-weight: 600; color: #c8b420; }
    .subtitle { font-size: 12px; color: #888; text-align: center; }
    #status {
      font-size: 12px;
      text-align: center;
      min-height: 16px;
      color: #aaa;
    }
    #status.error { color: #f87171; }
    #status.success { color: #86efac; }

    .char-list {
      width: 100%;
      display: flex;
      flex-direction: column;
      gap: 8px;
      max-height: 260px;
      overflow-y: auto;
    }
    .char-card {
      background: #16213e;
      border: 2px solid transparent;
      border-radius: 8px;
      padding: 10px 12px;
      cursor: pointer;
      transition: border-color 0.2s;
    }
    .char-card:hover { border-color: #c8b420; }
    .char-card.selected { border-color: #c8b420; background: #1a2a4e; }
    .char-card .name { font-size: 14px; font-weight: 700; color: #c8b420; }
    .char-card .info { font-size: 11px; color: #aaa; margin-top: 2px; }
    .char-card .stats-row {
      display: flex;
      gap: 6px;
      margin-top: 6px;
      flex-wrap: wrap;
    }
    .char-card .stat-badge {
      background: #0f3460;
      border-radius: 3px;
      padding: 2px 6px;
      font-size: 10px;
      text-align: center;
    }
    .char-card .stat-badge .label { color: #888; }
    .char-card .stat-badge .val { color: #e0e0e0; font-weight: 700; }

    button {
      background: #c8b420;
      color: #1a1a2e;
      border: none;
      border-radius: 6px;
      padding: 10px 24px;
      font-size: 14px;
      font-weight: 700;
      cursor: pointer;
      width: 100%;
      transition: background 0.2s;
    }
    button:hover { background: #e0cb30; }
    button:disabled { background: #555; color: #888; cursor: not-allowed; }
    button.secondary {
      background: #0f3460;
      color: #e0e0e0;
    }
    button.secondary:hover { background: #1a4a80; }

    .overlay {
      position: fixed;
      inset: 0;
      background: rgba(0, 0, 0, 0.65);
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 16px;
      z-index: 100;
    }
    .overlay-inner {
      background: #16213e;
      border: 1px solid #0f3460;
      border-radius: 8px;
      width: 100%;
      max-width: 340px;
      max-height: 90vh;
      overflow-y: auto;
      padding: 16px;
      display: flex;
      flex-direction: column;
      gap: 10px;
    }
    .overlay-header {
      display: flex;
      justify-content: space-between;
      align-items: center;
    }
    .overlay-header .title {
      font-weight: 700;
      color: #c8b420;
      font-size: 14px;
    }
    .overlay-header .close {
      background: none;
      color: #888;
      width: auto;
      padding: 2px 8px;
      font-size: 20px;
      font-weight: 400;
      border-radius: 4px;
    }
    .overlay-header .close:hover {
      background: #0f3460;
      color: #e0e0e0;
    }
    .overlay input[type=email],
    .overlay input[type=password] {
      background: #1a1a2e;
      border: 1px solid #0f3460;
      color: #e0e0e0;
      padding: 8px 10px;
      border-radius: 4px;
      font-size: 13px;
      font-family: inherit;
    }
    .overlay input:focus {
      outline: none;
      border-color: #c8b420;
    }
    .overlay .error-msg {
      color: #f87171;
      font-size: 11px;
    }
    .overlay .hint {
      font-size: 11px;
      color: #888;
      text-align: center;
    }
    .overlay .hint a { color: #c8b420; text-decoration: underline; }
    .remote-char {
      display: flex;
      justify-content: space-between;
      align-items: center;
      background: #0f3460;
      padding: 8px 10px;
      border-radius: 4px;
      gap: 8px;
    }
    .remote-char .rname {
      font-size: 13px;
      color: #e0e0e0;
      font-weight: 600;
      flex: 1;
      min-width: 0;
      overflow: hidden;
      text-overflow: ellipsis;
      white-space: nowrap;
    }
    .remote-char .rinfo {
      font-size: 10px;
      color: #aaa;
    }
    .remote-char button {
      width: auto;
      padding: 4px 10px;
      font-size: 11px;
    }
    .session-bar {
      display: flex;
      justify-content: space-between;
      align-items: center;
      font-size: 11px;
      color: #888;
    }
    .session-bar .link {
      color: #c8b420;
      cursor: pointer;
      text-decoration: underline;
      background: none;
      border: none;
      padding: 0;
      font-size: inherit;
      width: auto;
    }

    .empty-state {
      text-align: center;
      padding: 20px;
      color: #666;
      font-size: 13px;
    }
  </style>
</head>
<body>
  <h1>&#x2694; Vagabond PDF Exporter</h1>
  <div class="subtitle">Select a character to export to the Hero Record PDF</div>
  <div id="status">Loading characters...</div>
  <div class="char-list" id="charList"></div>
  <button id="exportBtn" disabled>Export to PDF</button>
  <button class="secondary" id="exportFoundryBtn" disabled>Export to Foundry JSON</button>
  <button class="secondary" id="vgbndUrlBtn">Import from vgbnd.app URL</button>
  <button class="secondary" id="vgbndBtn">Import from vgbnd.app (sign in)</button>
  <input type="file" id="importFile" accept=".json,application/json" style="display:none">
  <button class="secondary" id="importFileBtn">Import from Foundry JSON</button>

  <div id="vgbndOverlay" class="overlay" style="display:none">
    <div class="overlay-inner">
      <div class="overlay-header">
        <span class="title" id="vgbndTitle">vgbnd.app</span>
        <button class="close" id="vgbndClose" type="button">&times;</button>
      </div>
      <div id="vgbndBody"></div>
    </div>
  </div>

  <script type="module" src="app.js?v=0.3.15"></script>
</body>
</html>
